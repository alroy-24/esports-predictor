<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#07070d"/>
      <stop offset="0.55" stop-color="#0c0a18"/>
      <stop offset="1"   stop-color="#140a22"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0 L0 0 0 34" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- scanlines, faint -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- right: tactical crosshair / scope reticle -->
  <g transform="translate(965,160)" stroke="url(#ink)" fill="none">
    <circle r="118" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle r="86"  stroke-opacity="0.5"  stroke-width="2"/>
    <circle r="9"   stroke="#e879f9" stroke-width="2.5"/>
    <g stroke="#22d3ee" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-128" x2="0" y2="-26"/>
      <line x1="0" y1="26"  x2="0" y2="128"/>
      <line x1="-128" y1="0" x2="-26" y2="0"/>
      <line x1="26"  y1="0" x2="128" y2="0"/>
    </g>
    <!-- tick marks -->
    <g stroke="#7c5cff" stroke-width="2" stroke-opacity="0.7">
      <line x1="0" y1="-86" x2="0" y2="-72"/>
      <line x1="0" y1="72"  x2="0" y2="86"/>
      <line x1="-86" y1="0" x2="-72" y2="0"/>
      <line x1="72"  y1="0" x2="86"  y2="0"/>
    </g>
  </g>

  <!-- left: wordmark + tagline -->
  <g transform="translate(72,0)">
    <!-- tag pill -->
    <rect x="0" y="78" width="232" height="30" rx="15" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="20" cy="93" r="4" fill="#22d3ee"/>
    <text x="34" y="98" fill="#cbd5e1" font-size="13" letter-spacing="0.18em" font-weight="600">COUNTER-STRIKE 2 · ML</text>

    <text x="-2" y="186" font-size="78" font-weight="800" letter-spacing="-0.02em" fill="#f8fafc">Frag <tspan fill="url(#ink)">Forecast</tspan></text>

    <text x="0" y="232" font-size="20" fill="#94a3b8">Calibrated win probabilities for pro Counter-Strike 2 —</text>
    <text x="0" y="260" font-size="20" fill="#94a3b8">XGBoost · Elo · SHAP, with a 3D dashboard.</text>
  </g>
</svg>
